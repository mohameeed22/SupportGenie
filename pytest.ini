[pytest]
# Pytest configuration for SupportGenie

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Paths
testpaths = tests
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    integration: Integration tests requiring external services
    slow: Slow tests (>1s)
    unit: Unit tests

# Minimum Python version
minversion = 3.9
